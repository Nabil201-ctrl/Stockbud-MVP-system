# fly.toml app configuration file generated for stock-bud-quiet-sun-3919 on 2026-03-05T23:26:47+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stock-bud-quiet-sun-3919'
primary_region = 'lhr'

[build]

[env]
  PORT = '3000'
  SCOPES = 'customer_read_customers,customer_read_orders,customer_write_customers,customer_write_orders,read_content,read_customers,read_metaobject_definitions,read_metaobjects,read_online_store_pages,read_order_edits,read_orders,read_privacy_settings,read_product_feeds,read_product_listings,read_products,write_content,write_customers,write_metaobject_definitions,write_metaobjects,write_online_store_pages,write_order_edits,write_orders,write_privacy_settings,write_product_feeds,write_product_listings,write_products'
  SHOPIFY_API_KEY = '04d61909f0960da69ceb540832d2e0ef'
  SHOPIFY_APP_URL = 'https://stock-bud-quiet-sun-3919.fly.dev'

[processes]
  app = 'node ./dbsetup.js npm run docker-start'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
