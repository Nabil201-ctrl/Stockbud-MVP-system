# --- API SUBDOMAIN ---
server {
    listen 80;
    server_name api.stockbud.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.stockbud.xyz;

    ssl_certificate /etc/letsencrypt/live/api.stockbud.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.stockbud.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ { proxy_pass http://grafana:3000/; }
    location /rabbitmq/ { proxy_pass http://rabbitmq:15672/; }
    location /prometheus/ { proxy_pass http://prometheus:9090/; }
    location /images/ { proxy_pass http://image-service:3002/; }
}

# --- SHOPIFY SUBDOMAIN ---
server {
    listen 80;
    server_name shopify.stockbud.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name shopify.stockbud.xyz;

    # Make sure you run certbot for this domain first!
    ssl_certificate /etc/letsencrypt/live/shopify.stockbud.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shopify.stockbud.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://shopify-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for Shopify OAuth
        proxy_set_header X-Forwarded-Host $host;
    }
}

