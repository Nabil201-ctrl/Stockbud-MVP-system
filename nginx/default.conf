# --- API SUBDOMAIN ---
server {
    listen 80;
    server_name api.localhost;

    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /grafana/ { proxy_pass http://grafana:3000/; }
    location /rabbitmq/ { proxy_pass http://rabbitmq:15672/; }
    location /prometheus/ { proxy_pass http://prometheus:9090/; }
    location /images/ { proxy_pass http://image-service:3002/; }
}

# --- SHOPIFY SUBDOMAIN ---
server {
    listen 80;
    server_name shopify.localhost;

    location / {
        proxy_pass http://shopify-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Critical for Shopify OAuth
        proxy_set_header X-Forwarded-Host $host;
    }
}

# --- DOCS SUBDOMAIN ---
server {
    listen 80;
    server_name docs.localhost;

    location / {
        proxy_pass http://docs-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- ROOT DOMAIN ---
server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://platform-app:80; # Assuming Platform is served here in production
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

