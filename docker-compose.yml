version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - backend
      - shopify-app

  order-processor:
    build: ./Stockbud-MVP-system/backend/order-processor
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
    env_file:
      - ./Stockbud-MVP-system/backend/order-processor/.env
    depends_on:
      - rabbitmq

  backend:
    build: ./Stockbud-MVP-system/backend
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
    env_file:
      - ./Stockbud-MVP-system/backend/.env
    depends_on:
      - db
      - cache
      - rabbitmq
      - smtp
    volumes:
      - ./Stockbud-MVP-system/backend/data:/app/data
    environment:
      - SMTP_HOST=smtp
      - SMTP_PORT=25
      - SMTP_SECURE=false

  image-service:
    build: ./Stockbud-MVP-system/backend/image-service
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
    env_file:
      - ./Stockbud-MVP-system/backend/image-service/.env
    depends_on:
      - rabbitmq

  shopify-app:
    build: ./Stockbud-MVP-system/stockbud
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
    env_file:
      - ./Stockbud-MVP-system/stockbud/.env
    environment:
      - STOCKBUD_BACKEND_URL=https://api.stockbud.xyz
      - DATABASE_URL=postgresql://user:password@db:5432/mydb?schema=shopify_app
      - NODE_ENV=production
    depends_on:
      - backend
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@db:5432/db?sslmode=disable"
    depends_on:
      - db

  cache:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - cache

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 512M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    deploy:
      resources:
        limits:
          memory: 400M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      resources:
        limits:
          memory: 100M

  ollama:
    image: ollama/ollama:latest
    container_name: stockbud-ollama
    restart: always
    environment:
      - VITE_API_URL=https://api.stockbud.xyz
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - stockbud-network

  scraper-worker:
    build:
      context: ./backend/scraper-service
      dockerfile: Dockerfile
    container_name: stockbud-scraper-worker
    restart: always
    env_file:
      - ./backend/scraper-service/.env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - OLLAMA_URL=http://stockbud-ollama:11434
      - OLLAMA_MODEL=llama3
      - PORT=3005
    depends_on:
      - rabbitmq
      - ollama
    networks:
      - stockbud-network

  smtp:
    image: namshi/smtp
    container_name: stockbud-smtp
    restart: always
    ports:
      - "25:25"

networks:
  stockbud-network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
  ollama_data:
