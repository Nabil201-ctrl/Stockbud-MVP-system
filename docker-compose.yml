version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: stockbud-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - shopify-app
    networks:
      - stockbud-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: stockbud-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stockbud-network

  postgres:
    image: postgres:15-alpine
    container_name: stockbud-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockbud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stockbud-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockbud-backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - rabbitmq
    volumes:
      - ./backend/data:/app/data
    networks:
      - stockbud-network

  order-processor:
    build:
      context: ./backend/order-processor
      dockerfile: Dockerfile
    container_name: stockbud-order-processor
    restart: always
    env_file:
      - ./backend/order-processor/.env
    depends_on:
      - rabbitmq
    networks:
      - stockbud-network

  image-service:
    build:
      context: ./backend/image-service
      dockerfile: Dockerfile
    container_name: stockbud-image-service
    restart: always
    env_file:
      - ./backend/image-service/.env
    depends_on:
      - rabbitmq
    networks:
      - stockbud-network

  shopify-app:
    build:
      context: ./stockbud
      dockerfile: Dockerfile
    container_name: stockbud-shopify-app
    restart: always
    env_file:
      - ./stockbud/.env
    environment:
      - STOCKBUD_BACKEND_URL=http://stockbud-backend:3000
      - SHOPIFY_APP_URL=https://shopify.stockbud.xyz
      - DATABASE_URL=postgresql://postgres:password@stockbud-postgres:5432/stockbud?schema=shopify_app
      - NODE_ENV=production
    depends_on:
      - backend
      - postgres
    networks:
      - stockbud-network

  prometheus:
    image: prom/prometheus:latest
    container_name: stockbud-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - stockbud-network

  grafana:
    image: grafana/grafana:latest
    container_name: stockbud-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - stockbud-network

  docs-app:
    build:
      context: ./docs
      dockerfile: Dockerfile
    container_name: stockbud-docs
    restart: always
    networks:
      - stockbud-network

  mvp-app:
    build:
      context: ./MVP
      dockerfile: Dockerfile
    container_name: stockbud-mvp
    restart: always
    environment:
      - VITE_API_URL=https://api.stockbud.xyz
    networks:
      - stockbud-network

networks:
  stockbud-network:
    driver: bridge

volumes:
  rabbitmq_data:
  postgres_data:
  grafana_data:
